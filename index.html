<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLO-FIT | Personal Trainer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .holo-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(56, 189, 248, 0.3); backdrop-filter: blur(10px); }
        .btn-primary { background: linear-gradient(90deg, #38bdf8, #818cf8); transition: all 0.3s ease; }
        .btn-orange { background: linear-gradient(90deg, #f97316, #fbbf24); }
        .hidden { display: none !important; }
        .exercise-detail { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .exercise-card.active .exercise-detail { max-height: 500px; margin-top: 15px; }
        input, select { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
    </style>
</head>
<body class="p-4 md:p-8 max-w-2xl mx-auto pb-24">

    <div id="main-dashboard" class="hidden">
        <header class="flex justify-between items-start mb-6">
            <div>
                <h1 class="text-2xl font-black text-sky-400 uppercase italic">Holo-Fit</h1>
                <p id="display-nombre" class="text-slate-400 text-sm font-bold">---</p>
                <div class="flex gap-2 mt-1">
                    <button onclick="verCalendario()" class="text-[10px] text-sky-500 underline uppercase font-bold tracking-widest flex items-center gap-1">
                        <i data-lucide="calendar" class="w-3 h-3"></i> Historial
                    </button>
                    <button onclick="reiniciarApp()" class="text-[10px] text-red-500 underline uppercase font-bold tracking-widest">Reiniciar</button>
                </div>
            </div>
            <div class="text-right">
                <div class="flex items-center justify-end text-orange-400 font-black text-xl">
                    <i data-lucide="flame" class="mr-1 w-5 h-5"></i> <span id="racha-val">0</span>
                </div>
                <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">Sesiones</p>
            </div>
        </header>

        <div id="semana-container" class="flex justify-between gap-1 mb-8"></div>

        <div class="flex flex-col items-center mb-8">
            <div class="relative w-36 h-36 mb-4 flex items-center justify-center">
                <div class="absolute inset-0 bg-sky-500/10 rounded-full animate-pulse"></div>
                <span id="avatar-emoji" class="text-7xl drop-shadow-2xl">🐯</span>
            </div>
            <div class="text-center">
                <h2 id="titulo-rutina" class="text-xl font-black italic text-white uppercase tracking-tight">Cargando...</h2>
                <div id="lugar-badge" class="mt-1 inline-block bg-slate-800 text-sky-400 text-[9px] font-black px-3 py-1 rounded-full border border-sky-500/30 uppercase">---</div>
            </div>
        </div>

        <div id="ejercicios-container" class="space-y-4 mb-10"></div>

        <button id="btn-completar" onclick="registrarEntrenamiento()" class="btn-primary w-full py-5 rounded-3xl font-black text-lg shadow-xl uppercase tracking-tighter hover:scale-[1.02] active:scale-95 transition-all">
            Finalizar Entrenamiento de Hoy
        </button>
    </div>

    <div id="modal-encuesta" class="fixed inset-0 bg-slate-950 z-[200] flex items-center justify-center p-4 backdrop-blur-xl">
        <div class="holo-card p-8 rounded-[2.5rem] w-full max-w-md border-2 border-sky-500/30 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="text-3xl font-black mb-2 text-sky-400 italic italic tracking-tighter uppercase">Crear Perfil</h2>
            <p class="text-slate-500 text-[10px] mb-8 uppercase font-bold tracking-widest">Personaliza tu experiencia holográfica</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Nombre de Guerrero</label>
                    <input type="text" id="in-nombre" class="w-full p-4 rounded-2xl outline-none focus:border-sky-500" placeholder="Nombre">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Edad</label>
                        <input type="number" id="in-edad" class="w-full p-4 rounded-2xl outline-none" placeholder="Años">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Sexo</label>
                        <select id="in-sexo" class="w-full p-4 rounded-2xl outline-none">
                            <option value="M">Masculino</option>
                            <option value="F">Femenino</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Peso (kg)</label>
                        <input type="number" id="in-peso" class="w-full p-4 rounded-2xl outline-none" placeholder="70">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Estatura (cm)</label>
                        <input type="number" id="in-estatura" class="w-full p-4 rounded-2xl outline-none" placeholder="170">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Objetivo Principal</label>
                    <select id="in-objetivo" class="w-full p-4 rounded-2xl outline-none">
                        <option value="Musculo">Ganar Músculo 🦁</option>
                        <option value="Grasa">Perder Grasa 🐥</option>
                        <option value="Resistencia">Resistencia 🐯</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Lugar de Entrenamiento</label>
                    <select id="in-lugar" class="w-full p-4 rounded-2xl outline-none">
                        <option value="gym">Gimnasio Pro</option>
                        <option value="casa">En Casa (Sin equipo)</option>
                        <option value="aire_libre">Gym al Aire Libre</option>
                    </select>
                </div>
            </div>

            <button onclick="guardarPerfil()" class="btn-primary w-full py-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] text-slate-900 mt-8">Generar Plan Inteligente</button>
        </div>
    </div>

    <div id="modal-calendario" class="hidden fixed inset-0 bg-slate-950/95 z-[300] flex items-center justify-center p-4">
        <div class="holo-card p-6 rounded-[2rem] w-full max-w-sm text-center">
            <h3 class="text-xl font-black mb-4 text-sky-400">HISTORIAL DE GLORIA</h3>
            <div id="historial-lista" class="space-y-2 max-h-60 overflow-y-auto mb-6 text-sm text-slate-300">
                </div>
            <button onclick="cerrarCalendario()" class="w-full py-3 bg-slate-800 rounded-xl font-bold uppercase text-[10px]">Volver al Dashboard</button>
        </div>
    </div>

    <script>
        // DB DE EJERCICIOS ADAPTATIVOS
        const DB_EJERCICIOS = {
            Musculo: {
                avatar: "🦁",
                casa: [
                    { n: "Flexiones con Pausa", d: "Baja lento, mantén 2 segundos abajo y sube explosivo. Trabaja pecho y tríceps.", s: "4", r: "15", t: "60s", img: "https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?auto=format&fit=crop&q=60&w=200" },
                    { n: "Sentadilla Búlgara", d: "Eleva un pie en una silla o sofá. Baja hasta que la rodilla trasera casi toque el suelo.", s: "4", r: "12/lado", t: "60s", img: "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=60&w=200" }
                ],
                gym: [
                    { n: "Press de Banca", d: "Controla la barra hasta el pecho y empuja fuerte. Mantén los pies plantados.", s: "4", r: "10", t: "90s", img: "https://images.unsplash.com/photo-1541534741688-6078c6bfb5c5?auto=format&fit=crop&q=60&w=200" },
                    { n: "Sentadilla con Barra", d: "Barra sobre los trapecios. Baja rompiendo el paralelo con la espalda recta.", s: "4", r: "8", t: "120s", img: "https://images.unsplash.com/photo-1574680096145-d05b474e2155?auto=format&fit=crop&q=60&w=200" }
                ],
                aire_libre: [
                    { n: "Dominadas Supinas", d: "Cuélgate de la barra y sube la barbilla por encima. Enfócate en el bíceps y espalda.", s: "4", r: "Fallo", t: "90s", img: "https://images.unsplash.com/photo-1526506118085-60ce8714f8c5?auto=format&fit=crop&q=60&w=200" }
                ]
            },
            Grasa: {
                avatar: "🐥",
                casa: [
                    { n: "Burpees de Combate", d: "Pecho al suelo, salto explosivo y palmada arriba. No te detengas.", s: "4", r: "20", t: "30s", img: "https://images.unsplash.com/photo-1599058917232-d750c1859d7c?auto=format&fit=crop&q=60&w=200" }
                ],
                gym: [
                    { n: "Sprint en Cinta", d: "Inclinación 2%, velocidad máxima por 30 segundos. Recupera caminando.", s: "10", r: "30s", t: "30s", img: "https://images.unsplash.com/photo-1534258936925-c58bed479fcb?auto=format&fit=crop&q=60&w=200" }
                ]
            },
            Resistencia: { avatar: "🐯", casa: [{n: "Plancha Ninja", d: "Mantén posición de tabla apretando glúteos.", s: "4", r: "60s", t: "30s", img: "https://images.unsplash.com/photo-1566241134883-13eb2393a3cc?auto=format&fit=crop&q=60&w=200"}] }
        };

        const DIAS = ["DOM", "LUN", "MAR", "MIE", "JUE", "VIE", "SAB"];

        document.addEventListener('DOMContentLoaded', () => {
            const perfil = JSON.parse(localStorage.getItem('holofit_perfil'));
            if (!perfil) {
                document.getElementById('modal-encuesta').classList.remove('hidden');
            } else {
                renderDashboard(perfil);
            }
        });

        function guardarPerfil() {
            const data = {
                nombre: document.getElementById('in-nombre').value,
                edad: document.getElementById('in-edad').value,
                peso: document.getElementById('in-peso').value,
                estatura: document.getElementById('in-estatura').value,
                sexo: document.getElementById('in-sexo').value,
                objetivo: document.getElementById('in-objetivo').value,
                lugar: document.getElementById('in-lugar').value,
                completados: []
            };

            if(!data.nombre || !data.peso) return alert("Guerrero, rellena tus datos.");
            
            localStorage.setItem('holofit_perfil', JSON.stringify(data));
            document.getElementById('modal-encuesta').classList.add('hidden');
            renderDashboard(data);
        }

        function renderDashboard(perfil) {
            document.getElementById('main-dashboard').classList.remove('hidden');
            document.getElementById('display-nombre').innerText = `${perfil.nombre} | ${perfil.peso}kg - ${perfil.edad} años`;
            document.getElementById('racha-val').innerText = perfil.completados.length;
            document.getElementById('lugar-badge').innerText = `Ubicación: ${perfil.lugar}`;
            
            const configObj = DB_EJERCICIOS[perfil.objetivo];
            document.getElementById('avatar-emoji').innerText = configObj.avatar;
            document.getElementById('titulo-rutina').innerText = `Plan ${perfil.objetivo}`;
            
            // Cargar ejercicios basados en el lugar (si no hay para ese lugar específico, carga el de casa)
            const listaEx = configObj[perfil.lugar] || configObj.casa;
            renderEjercicios(listaEx);
            renderSemana(perfil.completados);
            lucide.createIcons();
        }

        function renderEjercicios(lista) {
            const container = document.getElementById('ejercicios-container');
            container.innerHTML = '';
            lista.forEach((ex, i) => {
                container.innerHTML += `
                    <div class="exercise-card holo-card p-5 rounded-3xl border-l-4 border-sky-500 cursor-pointer" onclick="toggleEx(this)">
                        <div class="flex justify-between items-center">
                            <div>
                                <h4 class="font-black text-white uppercase text-sm">${ex.n}</h4>
                                <div class="flex gap-4 mt-1 text-[10px] font-bold text-sky-400 uppercase">
                                    <span>${ex.s} SERIES</span>
                                    <span>${ex.r} REPS</span>
                                </div>
                            </div>
                            <i data-lucide="chevron-down" class="text-slate-500 w-5 h-5"></i>
                        </div>
                        <div class="exercise-detail">
                            <img src="${ex.img}" class="w-full h-32 object-cover rounded-2xl mb-3 border border-slate-700 shadow-lg">
                            <p class="text-xs text-slate-300 leading-relaxed font-medium bg-slate-900/50 p-3 rounded-xl border border-slate-800">
                                <span class="text-sky-400 font-bold">Instrucciones:</span> ${ex.d}
                                <br><br>
                                <span class="text-orange-400 font-bold">Descanso:</span> ${ex.t} entre series.
                            </p>
                        </div>
                    </div>
                `;
            });
        }

        function toggleEx(el) {
            el.classList.toggle('active');
            const icon = el.querySelector('[data-lucide]');
            if(el.classList.contains('active')) {
                icon.setAttribute('data-lucide', 'chevron-up');
            } else {
                icon.setAttribute('data-lucide', 'chevron-down');
            }
            lucide.createIcons();
        }

        function renderSemana(completados) {
            const container = document.getElementById('semana-container');
            container.innerHTML = '';
            const hoy = new Date().getDay();
            const hoyStr = new Date().toISOString().split('T')[0];

            DIAS.forEach((dia, i) => {
                const esHoy = i === hoy;
                const done = completados.includes(getFechaStr(i));
                let color = "bg-slate-800 text-slate-500 border-slate-700";
                if(done) color = "bg-orange-500/20 text-orange-400 border-orange-500/50";
                else if(esHoy) color = "bg-sky-500/20 text-sky-400 border-sky-400";

                container.innerHTML += `
                    <div class="flex-1 p-2 flex flex-col items-center rounded-xl border ${color} text-[9px] font-black">
                        ${dia}
                        <i data-lucide="${done ? 'check-circle' : 'circle'}" class="w-3 h-3 mt-1"></i>
                    </div>
                `;
            });

            if(completados.includes(hoyStr)) {
                const b = document.getElementById('btn-completar');
                b.innerText = "¡SESIÓN FINALIZADA! 🏆";
                b.classList.add('btn-orange');
                b.disabled = true;
            }
        }

        function getFechaStr(index) {
            const d = new Date();
            const diff = d.getDate() - d.getDay() + index;
            return new Date(d.setDate(diff)).toISOString().split('T')[0];
        }

        function registrarEntrenamiento() {
            const perfil = JSON.parse(localStorage.getItem('holofit_perfil'));
            const hoyStr = new Date().toISOString().split('T')[0];
            if(!perfil.completados.includes(hoyStr)) {
                perfil.completados.push(hoyStr);
                localStorage.setItem('holofit_perfil', JSON.stringify(perfil));
                location.reload();
            }
        }

        function verCalendario() {
            const perfil = JSON.parse(localStorage.getItem('holofit_perfil'));
            const lista = document.getElementById('historial-lista');
            lista.innerHTML = perfil.completados.length > 0 
                ? perfil.completados.map(f => `<div class="bg-slate-800 p-2 rounded-lg">🔥 Sesión: ${f}</div>`).join('')
                : "Aún no hay registros de batalla.";
            document.getElementById('modal-calendario').classList.remove('hidden');
        }

        function cerrarCalendario() { document.getElementById('modal-calendario').classList.add('hidden'); }
        function reiniciarApp() { if(confirm("¿Borrar todo?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
