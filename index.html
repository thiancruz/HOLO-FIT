<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLO-FIT | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .holo-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(56, 189, 248, 0.3); backdrop-filter: blur(10px); }
        .tiger-glow { filter: drop-shadow(0 0 15px #38bdf8); }
        .btn-primary { background: linear-gradient(90deg, #38bdf8, #818cf8); transition: all 0.3s ease; }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(56, 189, 248, 0.5); }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-bold tracking-tighter text-sky-400">HOLO-FIT</h1>
            <p class="text-slate-400 text-sm">Bienvenido, Guerrero</p>
        </div>
        <div class="text-right">
            <div class="flex items-center text-orange-400 font-bold italic">
                <i data-lucide="flame" class="mr-1"></i> 5 DÍAS
            </div>
            <p class="text-xs text-slate-500 uppercase tracking-widest">Racha Actual</p>
        </div>
    </header>

    <div class="flex flex-col items-center mb-10">
        <div class="relative w-48 h-48 mb-4 flex items-center justify-center">
            <div class="absolute inset-0 bg-sky-500/10 rounded-full animate-pulse"></div>
            <span class="text-8xl tiger-glow animate-bounce">🐯</span>
        </div>
        <div class="text-center">
            <h2 class="text-xl font-semibold">Tigre en Modo "Motivado"</h2>
            <p class="text-slate-400 text-sm px-6">Tu tigre está fuerte hoy. ¡Completa tu rutina para que no se duerma!</p>
        </div>
    </div>

    <div class="holo-card rounded-3xl p-6 mb-6">
        <div class="flex justify-between items-start mb-4">
            <div>
                <span class="bg-sky-500/20 text-sky-400 text-[10px] font-bold px-2 py-1 rounded uppercase">Hoy</span>
                <h3 class="text-xl font-bold mt-2">Quema de Grasa v1.0</h3>
                <p class="text-slate-400 text-sm">25 min • Sin equipo</p>
            </div>
            <div class="bg-slate-800 p-2 rounded-xl">
                <i data-lucide="play" class="text-sky-400 fill-current"></i>
            </div>
        </div>
        <button onclick="startWorkout()" class="btn-primary w-full py-4 rounded-2xl font-bold text-lg">
            EMPEZAR AHORA
        </button>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div class="holo-card rounded-2xl p-4">
            <i data-lucide="zap" class="text-yellow-400 mb-2"></i>
            <p class="text-2xl font-bold">1,240</p>
            <p class="text-slate-500 text-xs uppercase">Calorías</p>
        </div>
        <div class="holo-card rounded-2xl p-4">
            <i data-lucide="trophy" class="text-orange-400 mb-2"></i>
            <p class="text-2xl font-bold">12</p>
            <p class="text-slate-500 text-xs uppercase">Medallas</p>
        </div>
    </div>

    <div class="mt-8">
        <h4 class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-4 italic">Próximos Retos</h4>
        <div class="flex gap-4 overflow-x-auto pb-4">
            <div class="min-w-[100px] h-24 holo-card rounded-2xl flex flex-col items-center justify-center opacity-40">
                <i data-lucide="lock" size="20"></i>
                <p class="text-[10px] mt-2 font-bold">7 DÍAS 🔥</p>
            </div>
            <div class="min-w-[100px] h-24 holo-card rounded-2xl flex flex-col items-center justify-center opacity-40 border-dashed">
                <i data-lucide="lock" size="20"></i>
                <p class="text-[10px] mt-2 font-bold">100 SQUATS</p>
            </div>
        </div>
    </div>

    <script>
        // Funciones de Interfaz
function abrirModal() {
    document.getElementById('modal-editar').classList.remove('hidden');
}

function cerrarModal() {
    document.getElementById('modal-editar').classList.add('hidden');
}

// GUARDAR DATOS EN SUPABASE
async function guardarCambios() {
    const nuevoNombre = document.getElementById('input-nombre').value;
    const nuevoObjetivo = document.getElementById('input-objetivo').value;

    const { data: { user } } = await supabase.auth.getUser();

    if (user) {
        const { error } = await supabase
            .from('perfiles')
            .update({ 
                nombre_usuario: nuevoNombre, 
                objetivo: nuevoObjetivo 
            })
            .eq('id', user.id);

        if (!error) {
            // Actualizar la pantalla inmediatamente
            document.querySelector('p.text-slate-400.text-sm').innerText = `Bienvenido, ${nuevoNombre}`;
            alert("Perfil actualizado en la nube 🐯✨");
            cerrarModal();
        } else {
            alert("Error al guardar: " + error.message);
        }
    } else {
        alert("Debes iniciar sesión para guardar cambios");
    }
}
        // Inicializar iconos
        lucide.createIcons();

        function startWorkout() {
            alert("¡Preparando tu sesión holográfica! Tu Tigre está listo.");
        }
    </script>
</body>
</html>
</script>
<div id="modal-editar" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="holo-card p-6 rounded-3xl w-full max-w-sm border-2 border-sky-500">
        <h2 class="text-xl font-bold mb-4 text-sky-400">Editar Perfil</h2>
        
        <label class="block text-xs text-slate-400 uppercase mb-1">Nombre de Usuario</label>
        <input type="text" id="input-nombre" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 mb-4 text-white focus:border-sky-500 outline-none">
        
        <label class="block text-xs text-slate-400 uppercase mb-1">Tu Objetivo</label>
        <select id="input-objetivo" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 mb-6 text-white outline-none">
            <option value="Perder Grasa">Perder Grasa</option>
            <option value="Ganar Músculo">Ganar Músculo</option>
            <option value="Resistencia">Resistencia</option>
        </select>

        <div class="flex gap-3">
            <button onclick="cerrarModal()" class="flex-1 py-3 rounded-xl bg-slate-700 font-bold">Cancelar</button>
            <button onclick="guardarCambios()" class="flex-1 py-3 rounded-xl btn-primary font-bold">Guardar</button>
        </div>
    </div>
</div>

<button onclick="abrirModal()" class="text-xs text-sky-500 underline">Editar perfil</button>
</body>
</html>
