<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOLO-FIT | Alpha Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#38bdf8;--indigo:#6366f1;--bg:#020617;--surface:#0b1426;
  --surface2:#0f172a;--border:#1e293b;--border2:#334155;
  --text:#e2e8f0;--muted:#64748b;--sub:#94a3b8;
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;
  /* Nueva variable para suavizado */
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ─── RESET & BASE ─── */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
    background:var(--bg);
    color:var(--text);
    font-family:'Barlow Condensed',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    /* Mejora de renderizado de texto */
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(56,189,248,.12),transparent),
               radial-gradient(ellipse 60% 40% at 80% 80%,rgba(99,102,241,.08),transparent);
    pointer-events:none;
    z-index:0;
}

/* ─── SCROLLBAR (Mejorado para invisibilidad estética) ─── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--sky)}

/* ─── UTIL ─── */
.hidden{display:none!important}
.holo-card{
    background:rgba(11,20,38,.7);
    border:1px solid rgba(56,189,248,.15);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px); /* Soporte Safari */
}

/* Botón Mejorado con efecto Glow */
.btn-primary{
    background:linear-gradient(90deg,var(--sky),var(--indigo));
    border:none;
    color:#fff;
    cursor:pointer;
    transition: var(--transition);
    font-family:'Barlow Condensed',sans-serif;
    font-weight:900;
    letter-spacing:.05em;
    text-transform:uppercase;
    position: relative;
    overflow: hidden;
}
.btn-primary:hover{
    filter:brightness(1.1);
    transform:translateY(-2px);
    box-shadow:0 0 20px rgba(56,189,248,.4);
}

/* ─── MODAL ENCUESTA (Mejora de UX) ─── */
#modal-encuesta{
    position:fixed;
    inset:0;
    background: radial-gradient(circle at center, rgba(15, 23, 42, 0.9) 0%, var(--bg) 100%);
    z-index:300;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    overflow-y:auto;
}

.survey-card{
    padding:40px 36px;
    border-radius:32px;
    width:100%;
    max-width:440px;
    border:1px solid rgba(56,189,248,.3);
    position:relative;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
}

/* ─── INPUTS & SELECTORS ─── */
input, select {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 12px;
    padding: 14px 16px;
    transition: var(--transition);
}
input:focus {
    border-color: var(--sky);
    background: var(--surface);
}

.card-opt {
    user-select: none; /* Evita selección de texto al hacer click rápido */
    transition: var(--transition);
}

/* ─── DASHBOARD ─── */
#main-dashboard{
    padding:20px;
    max-width:600px;
    margin:0 auto;
    padding-bottom:140px;
    position:relative;
    z-index:1;
    animation: fadeIn 0.8s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Mejora de Tarjetas de Ejercicio */
.exercise-card {
    background: rgba(15, 23, 42, 0.4);
    border: 1px solid var(--border);
    margin-bottom: 12px;
    transition: var(--transition);
}
.exercise-card:hover {
    border-color: rgba(56, 189, 248, 0.4);
    background: rgba(15, 23, 42, 0.6);
}

/* ─── TIMER OVERLAY (Mejora visual) ─── */
#timer-overlay{
    backdrop-filter: blur(10px);
    background: rgba(2, 6, 23, 0.9);
}

#timer-number {
    text-shadow: 0 0 20px rgba(56,189,248,0.5);
}

/* ─── RESPONSIVIDAD ─── */
@media (max-width: 480px) {
    .survey-title { font-size: 32px; }
    .survey-card { padding: 24px; }
    .card-opt { min-width: 70px; padding: 10px 5px; }
    .brand { font-size: 26px; }
}
</style>
</head>
<body>

<div id="modal-encuesta">
  <div class="holo-card survey-card">
    <div class="survey-title">HOLO<span>-FIT</span></div>
    <p class="survey-sub">Configura tu perfil para generar tu rutina personalizada</p>
    <div class="form-row">
      <div class="form-group">
        <label>Tu nombre</label>
        <input type="text" id="in-nombre" placeholder="Nombre de guerrero/a" autocomplete="off"/>
      </div>
      <div style="display:flex;gap:12px">
        <div class="form-group" style="flex:1">
          <label>Edad</label>
          <input type="number" id="in-edad" placeholder="25" min="14" max="80"/>
        </div>
        <div class="form-group" style="flex:1">
          <label>Peso (kg)</label>
          <input type="number" id="in-peso" placeholder="70" min="30" max="200"/>
        </div>
      </div>
      <div class="form-group">
        <label>¿Eres?</label>
        <div class="card-selector" id="sel-sexo">
          <div class="card-opt" data-val="HOMBRE" onclick="selectOpt('sexo',this)">
            <span class="opt-icon">⚔️</span>
            <span class="opt-label">Guerrero</span>
          </div>
          <div class="card-opt" data-val="MUJER" onclick="selectOpt('sexo',this)">
            <span class="opt-icon">🏹</span>
            <span class="opt-label">Guerrera</span>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Objetivo principal</label>
        <div class="card-selector" id="sel-objetivo">
          <div class="card-opt" data-val="Musculo" onclick="selectOpt('objetivo',this)">
            <span class="opt-icon">💪</span>
            <span class="opt-label">Músculo</span>
          </div>
          <div class="card-opt" data-val="Grasa" onclick="selectOpt('objetivo',this)">
            <span class="opt-icon">🔥</span>
            <span class="opt-label">Grasa</span>
          </div>
          <div class="card-opt" data-val="Resistencia" onclick="selectOpt('objetivo',this)">
            <span class="opt-icon">⚡</span>
            <span class="opt-label">Resistencia</span>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Lugar de entrenamiento</label>
        <div class="card-selector" id="sel-lugar">
          <div class="card-opt" data-val="casa" onclick="selectOpt('lugar',this)">
            <span class="opt-icon">🏠</span>
            <span class="opt-label">En Casa</span>
          </div>
          <div class="card-opt" data-val="gym" onclick="selectOpt('lugar',this)">
            <span class="opt-icon">🏋️</span>
            <span class="opt-label">Gimnasio</span>
          </div>
        </div>
      </div>
      <button onclick="configurar()" class="btn-primary" style="width:100%;padding:18px;border-radius:16px;font-size:17px;margin-top:8px">INICIAR SISTEMA →</button>
    </div>
  </div>
</div>

<div id="main-dashboard" class="hidden">
  <header class="header-wrap">
    <div>
      <div class="brand">HOLO<span>-FIT</span></div>
      <div id="display-nombre" style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-family:'JetBrains Mono',monospace;margin-top:2px"></div>
    </div>
    <div class="racha-block">
      <div class="racha-num">🔥 <span id="racha-val">0</span></div>
      <div class="racha-lbl">Días completados</div>
      <button onclick="resetear()" style="margin-top:6px;background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:8px;cursor:pointer;font-size:10px;font-family:'JetBrains Mono',monospace">RESET</button>
    </div>
  </header>

  <div style="margin-bottom:8px">
    <p style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;font-family:'JetBrains Mono',monospace">Semana actual</p>
    <div id="semana-nav" class="week-nav"></div>
  </div>

  <div class="hero-block">
    <div class="avatar-outer">
      <div class="avatar-ring1"></div>
      <div class="avatar-ring2"></div>
      <span id="avatar-emoji"></span>
    </div>
    <div id="day-type-badge" class="day-type-badge badge-superior"></div>
    <h2 id="view-day-name"></h2>
    <div id="lugar-tag"></div>
    <div class="stats-row" id="stats-row"></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-header">
      <span class="progress-lbl">Progreso del día</span>
      <span id="progress-label" style="font-size:11px;color:var(--sky);font-weight:700;font-family:'JetBrains Mono',monospace">0/0</span>
    </div>
    <div class="progress-track"><div id="progress-fill" class="progress-fill" style="width:0%"></div></div>
  </div>

  <div id="ejercicios-list"></div>

  <button id="btn-finalizar" onclick="completarMision()" class="btn-primary">
    MARCAR DÍA COMO COMPLETADO
  </button>
</div>

<div id="timer-overlay">
  <div class="timer-lbl">⏱ Descanso activo</div>
  <div class="timer-circle">
    <svg class="timer-svg" width="220" height="220" viewBox="0 0 220 220">
      <circle cx="110" cy="110" r="96" fill="none" stroke="#1e293b" stroke-width="12"/>
      <circle id="timer-progress" cx="110" cy="110" r="96" fill="none" stroke="#38bdf8" stroke-width="12" stroke-dasharray="603" stroke-dashoffset="0"/>
    </svg>
    <div id="timer-number">--</div>
  </div>
  <div id="timer-ex-name"></div>
  <div id="timer-next-wrap" style="text-align:center">
    <div class="timer-next-lbl">Próximo ejercicio</div>
    <div id="timer-next-ex" class="timer-next-ex"></div>
  </div>
  <button onclick="cancelarTimer()" class="skip-btn">Saltar descanso ↗</button>
</div>

<div id="modal-celebracion">
  <div class="confetti-wrap" id="confetti-wrap"></div>
  <div class="holo-card cel-card">
    <span class="cel-avatar" id="cel-avatar"></span>
    <div class="cel-title">¡MISIÓN CUMPLIDA!</div>
    <p class="cel-frase" id="cel-frase"></p>
    <div class="cel-racha-box">
      <div class="cel-racha-lbl">Racha total</div>
      <div id="cel-racha">0 🔥</div>
    </div>
    <div class="cel-edu" id="cel-edu"></div>
    <button onclick="cerrarCelebracion()" class="btn-primary" style="width:100%;padding:16px;border-radius:16px;font-size:16px">CONTINUAR →</button>
  </div>
</div>

<div class="notif" id="notif"></div>

</body>
</html>
