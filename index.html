<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLO-FIT | Dashboard Offline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .holo-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(56, 189, 248, 0.3); backdrop-filter: blur(10px); }
        .tiger-glow { filter: drop-shadow(0 0 15px #38bdf8); }
        .btn-primary { background: linear-gradient(90deg, #38bdf8, #818cf8); transition: all 0.3s ease; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-8 max-w-2xl mx-auto">

    <header class="flex justify-between items-start mb-10">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-sky-400">HOLO-FIT</h1>
            <p id="display-nombre" class="text-slate-400 text-sm font-medium italic">Bienvenido, Guerrero</p>
            <button onclick="abrirModal()" class="text-[10px] text-sky-500 underline uppercase font-bold tracking-widest mt-1">Editar Perfil</button>
        </div>
        <div class="text-right">
            <div class="flex items-center justify-end text-orange-400 font-black italic text-xl">
                <i data-lucide="flame" class="mr-1 w-5 h-5"></i> <span id="racha-val">0</span>
            </div>
            <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Racha de Días</p>
        </div>
    </header>

    <div class="flex flex-col items-center mb-12">
        <div class="relative w-56 h-56 mb-6 flex items-center justify-center">
            <div class="absolute inset-0 bg-sky-500/20 rounded-full animate-ping opacity-20"></div>
            <div class="absolute inset-0 bg-sky-500/10 rounded-full animate-pulse"></div>
            <span id="tiger-emoji" class="text-9xl tiger-glow animate-bounce inline-block">🐯</span>
        </div>
        <div class="text-center">
            <h2 id="tiger-status" class="text-2xl font-bold tracking-tight mb-1 italic uppercase text-white">Tigre en Espera</h2>
            <p id="frase-motivadora" class="text-slate-400 text-sm max-w-[250px] mx-auto leading-relaxed">
                Tu compañero digital espera tu primer movimiento.
            </p>
        </div>
    </div>

    <div class="holo-card rounded-[2rem] p-7 mb-6 border-sky-400/20 shadow-2xl shadow-sky-900/20">
        <div class="flex justify-between items-center mb-6">
            <div>
                <span class="bg-sky-500/20 text-sky-400 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-wider">Objetivo Diario</span>
                <h3 class="text-2xl font-black mt-2 tracking-tight">Full Body Alpha</h3>
                <p class="text-slate-400 text-sm">25 min • Sin equipo</p>
            </div>
            <div class="bg-slate-800/80 p-4 rounded-2xl border border-slate-700">
                <i data-lucide="zap" class="text-sky-400 fill-current w-6 h-6"></i>
            </div>
        </div>
        <button onclick="registrarEntrenamiento()" class="btn-primary w-full py-5 rounded-2xl font-black text-lg shadow-lg shadow-sky-500/20 uppercase tracking-tighter">
            Finalizar Sesión +200 XP
        </button>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div class="holo-card rounded-3xl p-5 flex flex-col items-center border-yellow-500/20">
            <i data-lucide="flame" class="text-yellow-400 mb-2 w-6 h-6"></i>
            <p class="text-3xl font-black italic" id="calorias-val">0</p>
            <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest">Kcal Totales</p>
        </div>
        <div class="holo-card rounded-3xl p-5 flex flex-col items-center border-purple-500/20">
            <i data-lucide="target" class="text-purple-400 mb-2 w-6 h-6"></i>
            <p class="text-xl font-black italic text-center leading-none" id="objetivo-val">SIN META</p>
            <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest mt-1">Objetivo</p>
        </div>
    </div>

    <button onclick="reiniciarTodo()" class="w-full mt-10 text-[9px] text-slate-600 uppercase tracking-[0.2em] hover:text-red-500 transition-colors">
        Reiniciar Memoria del Sistema
    </button>

    <div id="modal-editar" class="hidden fixed inset-0 bg-slate-950/90 backdrop-blur-md flex items-center justify-center p-4 z-[120]">
        <div class="holo-card p-8 rounded-[2.5rem] w-full max-w-sm border-2 border-sky-500/30 shadow-2xl">
            <h2 class="text-2xl font-black mb-6 text-sky-400 italic uppercase">Reprogramar Perfil</h2>
            
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Nombre Clave</label>
            <input type="text" id="input-nombre" placeholder="Ej. Alex" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 mb-5 text-white outline-none focus:border-sky-500 transition-all">
            
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Objetivo de Misión</label>
            <select id="input-objetivo" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 mb-8 text-white outline-none focus:border-sky-500">
                <option value="Perder Grasa">Quemar Grasa</option>
                <option value="Ganar Músculo">Músculo Alpha</option>
                <option value="Resistencia">Resistencia</option>
            </select>

            <div class="flex gap-3">
                <button onclick="cerrarModal()" class="flex-1 py-4 rounded-xl bg-slate-800 font-bold text-xs uppercase tracking-widest border border-slate-700">Cerrar</button>
                <button onclick="guardarCambios()" class="flex-1 py-4 rounded-xl btn-primary font-bold text-xs uppercase tracking-widest text-slate-900">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        // --- LÓGICA DE PERSISTENCIA LOCAL (NO SUPABASE) ---

        // Cargar datos al abrir la página
        document.addEventListener('DOMContentLoaded', () => {
            const datosGuardados = JSON.parse(localStorage.getItem('holofit_user')) || {
                nombre: '',
                racha: 0,
                calorias: 0,
                objetivo: 'SIN META'
            };
            actualizarUI(datosGuardados);
            lucide.createIcons();
        });

        function actualizarUI(datos) {
            document.getElementById('display-nombre').innerText = `Bienvenido, ${datos.nombre || 'Guerrero'}`;
            document.getElementById('racha-val').innerText = datos.racha;
            document.getElementById('calorias-val').innerText = datos.calorias;
            document.getElementById('objetivo-val').innerText = datos.objetivo.toUpperCase();
            document.getElementById('tiger-status').innerText = `TIGRE DE ${datos.nombre || 'ALPHA'}`;
            
            // Evolución visual del tigre
            const emoji = document.getElementById('tiger-emoji');
            const frase = document.getElementById('frase-motivadora');
            
            if (datos.racha >= 1) {
                emoji.innerText = "🐅";
                frase.innerText = "Tu racha ha despertado al tigre. ¡Sigue así!";
            }
            if (datos.racha >= 5) {
                emoji.innerText = "🐆";
                emoji.style.filter = "drop-shadow(0 0 25px #fbbf24)";
                frase.innerText = "¡MODO ALPHA! Tu tigre es una bestia imparable.";
            }
        }

        function registrarEntrenamiento() {
            let datos = JSON.parse(localStorage.getItem('holofit_user')) || { nombre: '', racha: 0, calorias: 0, objetivo: 'SIN META' };
            
            datos.racha += 1;
            datos.calorias += 200;
            
            localStorage.setItem('holofit_user', JSON.stringify(datos));
            actualizarUI(datos);
            alert("¡ENTRENAMIENTO COMPLETADO! +200 XP 🐯🔥");
        }

        function guardarCambios() {
            const nombre = document.getElementById('input-nombre').value;
            const objetivo = document.getElementById('input-objetivo').value;

            if (!nombre) return alert("Ingresa un nombre clave");

            let datos = JSON.parse(localStorage.getItem('holofit_user')) || { racha: 0, calorias: 0 };
            datos.nombre = nombre;
            datos.objetivo = objetivo;

            localStorage.setItem('holofit_user', JSON.stringify(datos));
            actualizarUI(datos);
            cerrarModal();
        }

        function reiniciarTodo() {
            if(confirm("¿Estás seguro de que quieres borrar tu progreso? Tu tigre volverá a dormir.")) {
                localStorage.removeItem('holofit_user');
                location.reload();
            }
        }

        function abrirModal() { document.getElementById('modal-editar').classList.remove('hidden'); }
        function cerrarModal() { document.getElementById('modal-editar').classList.add('hidden'); }
    </script>
</body>
</html>
