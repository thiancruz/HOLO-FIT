<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLO-FIT | Entrenamiento Alpha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .holo-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(56, 189, 248, 0.3); backdrop-filter: blur(10px); }
        .tiger-glow { filter: drop-shadow(0 0 15px #38bdf8); }
        .btn-primary { background: linear-gradient(90deg, #38bdf8, #818cf8); transition: all 0.3s ease; }
        .btn-orange { background: linear-gradient(90deg, #f97316, #fbbf24); }
        .day-pill { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-8 max-w-2xl mx-auto pb-24">

    <div id="main-dashboard">
        <header class="flex justify-between items-start mb-8">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-sky-400 uppercase">Holo-Fit</h1>
                <p id="display-nombre" class="text-slate-400 text-sm font-medium italic">Guerrero</p>
                <button onclick="abrirModal()" class="text-[10px] text-sky-500 underline uppercase font-bold tracking-widest mt-1">Configuración</button>
            </div>
            <div class="text-right">
                <div class="flex items-center justify-end text-orange-400 font-black italic text-xl">
                    <i data-lucide="zap" class="mr-1 w-5 h-5"></i> <span id="racha-val">0</span>
                </div>
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest text-right">Sesiones Totales</p>
            </div>
        </header>

        <div class="mb-8">
            <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4 italic">Cronograma de Misión</h3>
            <div class="flex justify-between gap-1" id="semana-container">
                </div>
        </div>

        <div class="flex flex-col items-center mb-10">
            <div class="relative w-40 h-40 mb-4 flex items-center justify-center">
                <div class="absolute inset-0 bg-sky-500/10 rounded-full animate-pulse"></div>
                <span id="tiger-emoji" class="text-7xl tiger-glow animate-bounce">🐯</span>
            </div>
            <div class="text-center">
                <h2 id="titulo-rutina" class="text-xl font-black tracking-tight uppercase italic text-sky-400">Cargando Plan...</h2>
                <p id="objetivo-tag" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">---</p>
            </div>
        </div>

        <div id="ejercicios-container" class="space-y-3 mb-8">
            </div>

        <button id="btn-completar" onclick="registrarEntrenamiento()" class="btn-primary w-full py-5 rounded-2xl font-black text-lg shadow-lg uppercase tracking-tighter transition-all">
            Marcar Día como Completado
        </button>
    </div>

    <div id="modal-editar" class="fixed inset-0 bg-slate-950 z-[200] flex items-center justify-center p-4 backdrop-blur-xl">
        <div class="holo-card p-8 rounded-[2.5rem] w-full max-w-sm border-2 border-sky-500/30">
            <h2 class="text-3xl font-black mb-2 text-white italic uppercase tracking-tighter">Bienvenido</h2>
            <p class="text-slate-400 text-xs mb-8 uppercase tracking-widest font-bold">Configura tu perfil alpha</p>
            
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 italic">Nombre de Guerrero</label>
            <input type="text" id="input-nombre" placeholder="TU NOMBRE" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 mb-6 text-white outline-none focus:border-sky-500 font-bold">
            
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 italic">Objetivo de Misión</label>
            <div class="grid grid-cols-1 gap-3 mb-10">
                <button onclick="selectObj('Grasa', this)" class="obj-btn p-4 rounded-xl border border-slate-700 bg-slate-800 text-left text-sm font-bold hover:border-sky-500 transition-all">🔥 Quema de Grasa</button>
                <button onclick="selectObj('Musculo', this)" class="obj-btn p-4 rounded-xl border border-slate-700 bg-slate-800 text-left text-sm font-bold hover:border-sky-500 transition-all">💪 Ganar Músculo</button>
                <button onclick="selectObj('Resistencia', this)" class="obj-btn p-4 rounded-xl border border-slate-700 bg-slate-800 text-left text-sm font-bold hover:border-sky-500 transition-all">⚡ Resistencia</button>
            </div>

            <button onclick="guardarCambios()" class="btn-primary w-full py-4 rounded-xl font-black text-xs uppercase tracking-[0.2em] text-slate-900">Iniciar Sistema</button>
        </div>
    </div>

    <script>
        // --- BASE DE DATOS DE ENTRENAMIENTOS ---
        const PLANES = {
            Grasa: {
                nombre: "Protocolo Incinerador",
                ejercicios: [
                    { n: "Burpees", d: "Salto explosivo con flexión", s: "4", r: "12", t: "30s" },
                    { n: "Escaladores", d: "Rodillas al pecho rápido", s: "4", r: "40s", t: "30s" },
                    { n: "Jumping Jacks", d: "Salto abriendo brazos/piernas", s: "3", r: "50s", t: "20s" },
                    { n: "Sentadilla Salto", d: "Sentadilla con despegue", s: "4", r: "15", t: "45s" },
                    { n: "Plancha dinámica", d: "Subir y bajar antebrazos", s: "3", r: "45s", t: "30s" },
                    { n: "Zancadas", d: "Paso largo alternado", s: "4", r: "20", t: "30s" }
                ]
            },
            Musculo: {
                nombre: "Hipertrofia Alpha",
                ejercicios: [
                    { n: "Flexiones Diamante", d: "Manos juntas en forma de diamante", s: "4", r: "12", t: "60s" },
                    { n: "Sentadilla Búlgara", d: "Pie atrás en silla/banco", s: "4", r: "10/lado", t: "60s" },
                    { n: "Flexiones de Arquero", d: "Bajar alternando peso a un brazo", s: "3", r: "8", t: "90s" },
                    { n: "Puente de Glúteo", d: "Elevación de pelvis (añadir peso)", s: "4", r: "15", t: "60s" },
                    { n: "Fondos en Silla", d: "Extensión de tríceps", s: "4", r: "12", t: "60s" },
                    { n: "Dominadas / Remo", d: "Tirón vertical o bajo mesa", s: "4", r: "10", t: "90s" }
                ]
            },
            Resistencia: {
                nombre: "Resistencia Core-X",
                ejercicios: [
                    { n: "Plancha Abdominal", d: "Cuerpo recto, antebrazos", s: "4", r: "60s", t: "30s" },
                    { n: "V-Ups", d: "Tocar puntas pies sentado", s: "4", r: "15", t: "30s" },
                    { n: "Superman", d: "Elevación lumbar y piernas", s: "3", r: "20", t: "20s" },
                    { n: "Bicycle Crunches", d: "Codo a rodilla contraria", s: "4", r: "40s", t: "20s" },
                    { n: "Dead Bug", d: "Extensión brazo/pierna opuesta", s: "3", r: "12", t: "30s" },
                    { n: "Side Plank", d: "Plancha lateral", s: "3", r: "45s/lado", t: "30s" }
                ]
            }
        };

        const DIAS = ["DOM", "LUN", "MAR", "MIE", "JUE", "VIE", "SAB"];
        let objetivoSeleccionado = '';

        // --- LÓGICA CORE ---
        document.addEventListener('DOMContentLoaded', () => {
            const data = JSON.parse(localStorage.getItem('holofit_pro'));
            if (!data) {
                abrirModal();
            } else {
                cerrarModal();
                renderAll(data);
            }
        });

        function selectObj(val, btn) {
            objetivoSeleccionado = val;
            document.querySelectorAll('.obj-btn').forEach(b => b.classList.remove('border-sky-500', 'bg-sky-500/10'));
            btn.classList.add('border-sky-500', 'bg-sky-500/10');
        }

        function guardarCambios() {
            const nombre = document.getElementById('input-nombre').value;
            if (!nombre || !objetivoSeleccionado) return alert("Completa todos los datos, Guerrero.");

            const nuevoPerfil = {
                nombre: nombre,
                objetivo: objetivoSeleccionado,
                racha: 0,
                completados: [] // Guardará fechas tipo "2023-10-27"
            };

            localStorage.setItem('holofit_pro', JSON.stringify(nuevoPerfil));
            cerrarModal();
            renderAll(nuevoPerfil);
        }

        function renderAll(data) {
            document.getElementById('display-nombre').innerText = `Guerrero ${data.nombre}`;
            document.getElementById('racha-val').innerText = data.completados.length;
            document.getElementById('objetivo-tag').innerText = `PLAN: ${data.objetivo}`;
            
            const planActual = PLANES[data.objetivo];
            document.getElementById('titulo-rutina').innerText = planActual.nombre;

            renderCalendario(data);
            renderEjercicios(planActual.ejercicios);
            lucide.createIcons();
        }

        function renderCalendario(data) {
            const container = document.getElementById('semana-container');
            container.innerHTML = '';
            const hoy = new Date();
            const diaSemanaHoy = hoy.getDay();

            DIAS.forEach((dia, index) => {
                const esHoy = index === diaSemanaHoy;
                const fueCompletado = data.completados.includes(getFechaStr(index));
                
                let colorClass = "bg-slate-800 text-slate-500 border-slate-700";
                if (fueCompletado) colorClass = "bg-orange-500/20 text-orange-400 border-orange-500/50";
                else if (esHoy) colorClass = "bg-sky-500/20 text-sky-400 border-sky-400";

                container.innerHTML += `
                    <div class="day-pill flex-1 flex flex-col items-center p-2 rounded-xl border ${colorClass} text-[10px] font-bold">
                        <span>${dia}</span>
                        ${fueCompletado ? '<i data-lucide="check-circle" class="w-3 h-3 mt-1"></i>' : `<span class="mt-1">${hoy.getDate() - (diaSemanaHoy - index)}</span>`}
                    </div>
                `;
            });

            // Si hoy ya está completado, cambiamos el botón
            const hoyCompletado = data.completados.includes(getFechaStr(diaSemanaHoy));
            const btn = document.getElementById('btn-completar');
            if(hoyCompletado) {
                btn.innerText = "¡MISIÓN DE HOY CUMPLIDA!";
                btn.classList.add('btn-orange');
                btn.disabled = true;
            }
        }

        function renderEjercicios(ejercicios) {
            const container = document.getElementById('ejercicios-container');
            container.innerHTML = '';
            ejercicios.forEach(ex => {
                container.innerHTML += `
                    <div class="holo-card p-4 rounded-2xl flex justify-between items-center border-l-4 border-l-sky-500">
                        <div>
                            <h4 class="font-bold text-sm uppercase">${ex.n}</h4>
                            <p class="text-[10px] text-slate-400">${ex.d}</p>
                            <div class="flex gap-3 mt-2 text-[9px] font-black text-sky-400 uppercase">
                                <span>${ex.s} SERIES</span>
                                <span>${ex.r} REPS</span>
                                <span class="text-slate-500">DESC: ${ex.t}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function registrarEntrenamiento() {
            const data = JSON.parse(localStorage.getItem('holofit_pro'));
            const hoyStr = getFechaStr(new Date().getDay());

            if (!data.completados.includes(hoyStr)) {
                data.completados.push(hoyStr);
                localStorage.setItem('holofit_pro', JSON.stringify(data));
                renderAll(data);
                alert("¡Felicidades! Tu tigre ha subido de nivel hoy. 🐅🔥");
            }
        }

        function getFechaStr(diaSemanaIndex) {
            const d = new Date();
            const diff = d.getDate() - d.getDay() + diaSemanaIndex;
            const target = new Date(d.setDate(diff));
            return target.toISOString().split('T')[0];
        }

        function abrirModal() { document.getElementById('modal-editar').classList.remove('hidden'); }
        function cerrarModal() { document.getElementById('modal-editar').classList.add('hidden'); }
    </script>
</body>
</html>
