<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLO-FIT | Alpha Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; }
        .holo-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(56, 189, 248, 0.2); backdrop-filter: blur(12px); }
        .btn-primary { background: linear-gradient(90deg, #0ea5e9, #6366f1); transition: all 0.3s ease; }
        .btn-completed { background: linear-gradient(90deg, #ef4444, #991b1b) !important; }
        .hidden { display: none !important; }
        .exercise-detail { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
        .exercise-card.active .exercise-detail { max-height: 600px; margin-top: 15px; }
        .day-btn { transition: all 0.2s ease; cursor: pointer; }
        .day-active { border-color: #38bdf8 !important; background: rgba(56, 189, 248, 0.1); scale: 1.05; }
        .day-done { border-color: #ef4444 !important; background: rgba(239, 68, 68, 0.2); color: #f87171; }
    </style>
</head>
<body class="p-4 md:p-8 max-w-2xl mx-auto pb-28">

    <div id="main-dashboard" class="hidden">
        <header class="flex justify-between items-start mb-6">
            <div>
                <h1 class="text-3xl font-black text-sky-500 italic tracking-tighter">HOLO-FIT</h1>
                <p id="display-nombre" class="text-slate-500 text-xs font-bold uppercase tracking-widest"></p>
            </div>
            <div class="text-right">
                <div class="flex items-center justify-end text-red-500 font-black text-2xl italic">
                    <i data-lucide="flame" class="mr-1 fill-current"></i> <span id="racha-val">0</span>
                </div>
                <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">Racha Total</p>
            </div>
        </header>

        <div class="mb-8">
            <p class="text-[10px] text-slate-500 font-bold uppercase mb-3 tracking-widest italic">Selecciona el día de entrenamiento:</p>
            <div id="semana-nav" class="flex justify-between gap-1"></div>
        </div>

        <div class="flex flex-col items-center mb-6">
            <div class="relative w-32 h-32 mb-2 flex items-center justify-center">
                <div class="absolute inset-0 bg-sky-500/5 rounded-full animate-pulse"></div>
                <span id="avatar-emoji" class="text-7xl drop-shadow-[0_0_15px_rgba(56,189,248,0.4)]"></span>
            </div>
            <h2 id="view-day-name" class="text-xl font-black italic text-white uppercase italic tracking-tight">Cargando...</h2>
            <p id="lugar-tag" class="text-[9px] text-sky-400 font-bold uppercase"></p>
        </div>

        <div id="ejercicios-list" class="space-y-4 mb-8"></div>

        <button id="btn-finalizar" onclick="completarMision()" class="btn-primary w-full py-5 rounded-2xl font-black text-lg shadow-xl uppercase tracking-tighter hover:scale-[1.02] active:scale-95 transition-all">
            MARCAR DÍA COMO COMPLETADO
        </button>
    </div>

    <div id="modal-encuesta" class="fixed inset-0 bg-slate-950 z-[200] flex items-center justify-center p-4">
        <div class="holo-card p-8 rounded-[2.5rem] w-full max-w-md border-2 border-sky-500/30">
            <h2 class="text-3xl font-black text-sky-400 italic mb-6">NUEVO GUERRERO</h2>
            <div class="space-y-4">
                <input type="text" id="in-nombre" placeholder="TU NOMBRE" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 outline-none">
                <select id="in-objetivo" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 outline-none">
                    <option value="Musculo">Ganar Músculo 🦁</option>
                    <option value="Grasa">Perder Grasa 🐥</option>
                    <option value="Resistencia">Resistencia 🐯</option>
                </select>
                <select id="in-lugar" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 outline-none">
                    <option value="casa">En Casa</option>
                    <option value="gym">En Gimnasio</option>
                </select>
            </div>
            <button onclick="configurar()" class="btn-primary w-full py-4 rounded-xl font-black mt-8 uppercase">INICIAR SISTEMA</button>
        </div>
    </div>

    <script>
        const FRASES = [
            "¡Nivel Alpha alcanzado! El tigre ruge hoy.",
            "Dolor es debilidad saliendo del cuerpo. ¡Bien hecho!",
            "Un día más cerca de tu mejor versión.",
            "¡Bestial! Los límites son mentales.",
            "Misión cumplida. Tu disciplina es tu superpoder."
        ];

        const RUTINAS_BASE = {
            Musculo: { avatar: "🦁", ejercicios: [
                {n: "Empuje Alpha", d: "Enfoque en pecho y hombros. Baja en 3 segundos.", s: "4", r: "12", t: "60s", img: "https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=200"},
                {n: "Sentadilla Poder", d: "Espalda recta, rompe el paralelo. Siente el peso en los talones.", s: "4", r: "10", t: "90s", img: "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=200"},
                {n: "Tirón Vertical", d: "Contracción máxima de dorsales. No uses el balanceo.", s: "3", r: "12", t: "60s", img: "https://images.unsplash.com/photo-1526506118085-60ce8714f8c5?w=200"},
                {n: "Zancada Explosiva", d: "Paso largo y firme. Controla el equilibrio del núcleo.", s: "4", r: "12/lado", t: "45s", img: "https://images.unsplash.com/photo-1594381898411-846e7d193883?w=200"},
                {n: "Curl de Poder", d: "Bíceps bajo tensión constante. No estires del todo abajo.", s: "3", r: "15", t: "45s", img: "https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?w=200"},
                {n: "Puente de Hierro", d: "Elevación de pelvis. Aprieta glúteos 2 segundos arriba.", s: "4", r: "20", t: "60s", img: "https://images.unsplash.com/photo-1599058917232-d750c1859d7c?w=200"}
            ]},
            Grasa: { avatar: "🐥", ejercicios: [
                {n: "Burpees Infierno", d: "Pecho al suelo y salto máximo. Cardio explosivo.", s: "4", r: "15", t: "30s", img: "https://images.unsplash.com/photo-1599058917232-d750c1859d7c?w=200"},
                {n: "Escaladores", d: "Rodillas al pecho lo más rápido posible. Core firme.", s: "4", r: "45s", t: "30s", img: "https://images.unsplash.com/photo-1599058917765-a780eda07a3e?w=200"},
                {n: "Jumping Jacks", d: "Movimiento constante. Mantén el ritmo cardíaco alto.", s: "4", r: "60s", t: "20s", img: "https://images.unsplash.com/photo-1601422407692-ec4eeec1d9b3?w=200"},
                {n: "Senta-Salto", d: "Baja en sentadilla y salta lo más alto que puedas.", s: "4", r: "15", t: "30s", img: "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=200"},
                {n: "Plancha Dinámica", d: "Pasa de antebrazos a manos sin mover la cadera.", s: "3", r: "12", t: "30s", img: "https://images.unsplash.com/photo-1566241134883-13eb2393a3cc?w=200"},
                {n: "Sprint Estático", d: "Corre en el sitio levantando rodillas al máximo.", s: "4", r: "45s", t: "30s", img: "https://images.unsplash.com/photo-1534258936925-c58bed479fcb?w=200"}
            ]},
            Resistencia: { avatar: "🐯", ejercicios: [
                {n: "Plancha Abdominal", d: "Cuerpo recto como una tabla. Aprieta todo el core.", s: "4", r: "60s", t: "30s", img: "https://images.unsplash.com/photo-1566241134883-13eb2393a3cc?w=200"},
                {n: "Zancada con Salto", d: "Cambia de pierna en el aire. Controla el aterrizaje.", s: "4", r: "12", t: "45s", img: "https://images.unsplash.com/photo-1594381898411-846e7d193883?w=200"},
                {n: "Flexión Diamante", d: "Manos juntas formando un diamante. Codos pegados.", s: "4", r: "10", t: "60s", img: "https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=200"},
                {n: "Paso de Oso", d: "Camina a cuatro patas sin tocar rodillas el suelo.", s: "3", r: "10m", t: "30s", img: "https://images.unsplash.com/photo-1599058917232-d750c1859d7c?w=200"},
                {n: "Fondos", d: "Usa una silla o banco. Baja hasta 90 grados.", s: "4", r: "15", t: "45s", img: "https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?w=200"},
                {n: "Sentadilla Isométrica", d: "Apóyate en la pared en 90 grados y aguanta.", s: "3", r: "45s", t: "30s", img: "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=200"}
            ]}
        };

        const DIAS = ["DOM", "LUN", "MAR", "MIE", "JUE", "VIE", "SAB"];
        let diaSeleccionado = new Date().getDay();

        document.addEventListener('DOMContentLoaded', () => {
            const p = JSON.parse(localStorage.getItem('holofit_v2'));
            if (!p) document.getElementById('modal-encuesta').classList.remove('hidden');
            else render(p);
        });

        function configurar() {
            const p = {
                nombre: document.getElementById('in-nombre').value,
                objetivo: document.getElementById('in-objetivo').value,
                lugar: document.getElementById('in-lugar').value,
                completados: []
            };
            if(!p.nombre) return alert("Guerrero, dime tu nombre.");
            localStorage.setItem('holofit_v2', JSON.stringify(p));
            document.getElementById('modal-encuesta').classList.add('hidden');
            render(p);
        }

        function render(p) {
            document.getElementById('main-dashboard').classList.remove('hidden');
            document.getElementById('display-nombre').innerText = `Guerrero ${p.nombre}`;
            document.getElementById('racha-val').innerText = p.completados.length;
            document.getElementById('avatar-emoji').innerText = RUTINAS_BASE[p.objetivo].avatar;
            document.getElementById('lugar-tag').innerText = `Lugar: ${p.lugar}`;
            
            renderNav(p);
            showDay(diaSeleccionado);
        }

        function renderNav(p) {
            const nav = document.getElementById('semana-nav');
            nav.innerHTML = '';
            const hoy = new Date().getDay();
            
            DIAS.forEach((dia, i) => {
                const done = p.completados.includes(getFechaStr(i));
                const active = i === diaSeleccionado;
                
                nav.innerHTML += `
                    <div onclick="selectDay(${i})" class="day-btn flex-1 p-2 rounded-xl border flex flex-col items-center text-[10px] font-black 
                        ${done ? 'day-done' : (active ? 'day-active' : 'bg-slate-900 border-slate-800 text-slate-500')}">
                        ${dia}
                        <i data-lucide="${done ? 'check-circle' : (active ? 'circle-dot' : 'circle')}" class="w-3 h-3 mt-1"></i>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function selectDay(i) {
            diaSeleccionado = i;
            const p = JSON.parse(localStorage.getItem('holofit_v2'));
            renderNav(p);
            showDay(i);
        }

        function showDay(i) {
            const p = JSON.parse(localStorage.getItem('holofit_v2'));
            const ejercicios = RUTINAS_BASE[p.objetivo].ejercicios;
            document.getElementById('view-day-name').innerText = `Rutina: ${DIAS[i]}`;
            
            const list = document.getElementById('ejercicios-list');
            list.innerHTML = '';
            ejercicios.forEach(ex => {
                list.innerHTML += `
                    <div class="exercise-card holo-card p-5 rounded-2xl border-l-4 border-sky-500 cursor-pointer" onclick="this.classList.toggle('active')">
                        <div class="flex justify-between items-center text-sm font-black uppercase">
                            <span>${ex.n}</span>
                            <div class="text-[10px] text-sky-400">
                                <span>${ex.s}x${ex.r}</span>
                            </div>
                        </div>
                        <div class="exercise-detail">
                            <img src="${ex.img}" class="w-full h-32 object-cover rounded-xl mb-3">
                            <p class="text-[11px] text-slate-300 leading-relaxed"><span class="text-sky-500 font-bold italic">TÉCNICA:</span> ${ex.d}</p>
                            <p class="text-[11px] text-orange-400 mt-2 font-bold uppercase">Descanso: ${ex.t}</p>
                        </div>
                    </div>
                `;
            });

            const btn = document.getElementById('btn-finalizar');
            const esHoy = i === new Date().getDay();
            const doneHoy = p.completados.includes(getFechaStr(i));

            if(doneHoy) {
                btn.innerText = "MISIÓN CUMPLIDA";
                btn.classList.add('btn-completed');
                btn.disabled = true;
            } else if (!esHoy) {
                btn.innerText = "NO ES TU DÍA ACTUAL";
                btn.classList.remove('btn-completed');
                btn.disabled = true;
                btn.style.opacity = "0.5";
            } else {
                btn.innerText = "MARCAR DÍA COMO COMPLETADO";
                btn.classList.remove('btn-completed');
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }

        function completarMision() {
            const p = JSON.parse(localStorage.getItem('holofit_v2'));
            const hoyStr = getFechaStr(new Date().getDay());
            
            if(!p.completados.includes(hoyStr)) {
                p.completados.push(hoyStr);
                localStorage.setItem('holofit_v2', JSON.stringify(p));
                const frase = FRASES[Math.floor(Math.random() * FRASES.length)];
                alert(frase);
                render(p);
            }
        }

        function getFechaStr(index) {
            const d = new Date();
            const diff = d.getDate() - d.getDay() + index;
            return new Date(d.setDate(diff)).toISOString().split('T')[0];
        }
    </script>
</body>
</html>
